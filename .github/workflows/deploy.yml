name: Deploy Website via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Sync Files
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Sync files to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftp.netfollows.com
        username: ftp-netfollows@netfollows.com
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        server-dir: public_html/
        exclude: |
          **/.git*
          **/.git*/**
          **/vendor/**
          .env
          ftp_listing.txt
          router.php
          start.sh

    - name: Run hosting DB migration helper
      run: |
        curl -fsS "https://netfollows.com/hosting-db-columns.php"
